<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학학원 - 학부모 포털</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --primary: #1B4332;
  --primary-light: #2D6A4F;
  --primary-pale: #D8F3DC;
  --accent: #E07A2F;
  --accent-pale: #FDE8D0;
  --text: #1A1A1A;
  --text-soft: #555555;
  --text-muted: #999999;
  --border: #E8E4DD;
  --present: #2D6A4F;
  --present-bg: #D8F3DC;
  --absent: #C0392B;
  --absent-bg: #FADBD8;
  --late: #E07A2F;
  --late-bg: #FDE8D0;
  --danger: #C0392B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

/* ── Login ── */
.login-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, var(--primary) 0%, var(--primary-light) 100%);
  padding: 20px;
}
.login-box {
  width: 100%; max-width: 400px;
  background: var(--card);
  border-radius: 16px;
  padding: 48px 36px 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-logo {
  text-align: center;
  margin-bottom: 36px;
}
.login-logo .icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--primary-pale);
  font-size: 28px;
  margin-bottom: 16px;
}
.login-logo h1 {
  font-size: 22px; font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
}
.login-logo p {
  font-size: 14px; color: var(--text-muted);
  margin-top: 6px;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px; font-weight: 600;
  color: var(--text-soft);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  background: #fff;
}
.form-input:focus { border-color: var(--primary); }
.form-input::placeholder { color: #bbb; }
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 42px; }
.pw-toggle {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 16px;
  color: var(--text-muted); padding: 4px;
}
.login-err {
  font-size: 13px; color: var(--danger);
  text-align: center; margin-top: 8px;
  min-height: 18px;
}
.btn-primary {
  width: 100%; padding: 13px 0;
  border-radius: 10px; border: none;
  background: var(--primary); color: #fff;
  font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover { background: var(--primary-light); }
.demo-box {
  margin-top: 28px;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: 10px;
  font-size: 12px; color: var(--text-muted);
  line-height: 1.7;
}
.demo-box strong { color: var(--text-soft); }

/* ── Header ── */
.app-header {
  background: var(--primary); color: #fff;
  padding: 16px 20px;
  display: flex; align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .logo { display: flex; align-items: center; gap: 10px; }
.app-header .logo span:first-child { font-size: 22px; }
.app-header .logo span:last-child { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right .user-name { font-size: 13px; opacity: 0.8; }
.btn-logout {
  background: rgba(255,255,255,0.15); border: none;
  color: #fff; padding: 6px 14px;
  border-radius: 8px; font-size: 13px;
  cursor: pointer; font-family: inherit;
}

/* ── Tabs ── */
.tab-nav {
  display: flex; background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 99;
}
.tab-btn {
  flex: 1; padding: 12px 0;
  border: none;
  border-bottom: 3px solid transparent;
  background: none; cursor: pointer;
  font-family: inherit; font-size: 14px;
  font-weight: 500; color: var(--text-muted);
  display: flex; align-items: center;
  justify-content: center; gap: 5px;
  transition: all 0.2s;
}
.tab-btn.active {
  font-weight: 700;
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* ── Main Content ── */
.main-content {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: 14px;
  padding: 22px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.card-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px;
}
.avatar {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--primary-pale);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 20px; font-weight: 800;
  color: var(--primary); flex-shrink: 0;
}
.avatar.sm { width: 44px; height: 44px; border-radius: 11px; font-size: 18px; }
.student-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.student-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.info-cell {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px 14px;
}
.info-cell .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.info-cell .value { font-size: 14px; font-weight: 600; }

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 800; }

.attend-stat {
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
}
.attend-stat .label { font-size: 11px; font-weight: 600; }
.attend-stat .value { font-size: 28px; font-weight: 800; margin-top: 4px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
}
.badge-present { background: var(--present-bg); color: var(--present); }
.badge-absent { background: var(--absent-bg); color: var(--absent); }
.badge-late { background: var(--late-bg); color: var(--late); }
.badge-hw-done { background: var(--present-bg); color: var(--present); font-size: 12px; }
.badge-hw-not { background: var(--absent-bg); color: var(--absent); font-size: 12px; }
.badge-hw-exempt { background: var(--bg); color: var(--text-muted); font-size: 12px; }

/* ── Score Bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 10px; width: 100%; }
.score-track {
  flex: 1; height: 8px;
  border-radius: 4px;
  background: var(--border);
  overflow: hidden;
}
.score-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.6s ease;
}
.score-num { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }

/* ── List ── */
.list-card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.list-title {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 700;
}
.list-item {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.list-date { font-size: 14px; font-weight: 600; }
.list-note { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* ── Achievement Card ── */
.achieve-card {
  background: var(--card);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.achieve-top {
  display: flex; justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px; flex-wrap: wrap; gap: 6px;
}
.achieve-meta { font-size: 13px; color: var(--text-muted); }
.achieve-topic { font-size: 15px; font-weight: 700; margin-top: 3px; }
.achieve-comment {
  margin-top: 10px; font-size: 13px;
  color: var(--text-soft); line-height: 1.6;
  background: var(--bg);
  padding: 10px 14px; border-radius: 8px;
}

/* ── Chart ── */
.chart-section { margin-bottom: 14px; }
.chart-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

/* ── Admin ── */
.student-list-item {
  background: var(--card);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.1s;
}
.student-list-item:hover { transform: scale(1.01); }
.student-list-item .arrow { font-size: 18px; color: var(--text-muted); }

.back-btn {
  background: none; border: none;
  color: var(--primary); font-size: 14px;
  font-weight: 600; cursor: pointer;
  font-family: inherit;
  padding: 0 0 16px;
  display: flex; align-items: center; gap: 4px;
}
.admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.admin-tab {
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border: 1px solid var(--border);
  background: var(--card); color: var(--text-soft);
  transition: all 0.15s;
}
.admin-tab.active {
  background: var(--primary);
  color: #fff; border-color: var(--primary);
}

/* ── Form ── */
.form-card {
  background: var(--card);
  border-radius: 14px;
  padding: 24px 20px;
  border: 1px solid var(--border);
}
.form-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.form-card .form-group { margin-bottom: 16px; }
textarea.form-input { resize: vertical; min-height: 80px; }
.status-btns { display: flex; gap: 8px; }
.status-btn {
  flex: 1; padding: 10px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-soft);
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.status-btn.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.late-minutes-group {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--late-bg);
  border-radius: 10px;
  display: flex; align-items: center; gap: 10px;
}
.late-minutes-group label {
  font-size: 13px; font-weight: 600;
  color: var(--late); white-space: nowrap;
}
.late-minutes-input {
  width: 80px; padding: 8px 10px;
  border-radius: 8px;
  border: 1.5px solid var(--accent);
  font-size: 14px; font-weight: 600;
  font-family: inherit; outline: none;
  text-align: center; background: #fff;
}
.late-minutes-input:focus { border-color: var(--primary); }
.late-minutes-unit {
  font-size: 13px; color: var(--late); font-weight: 500;
}

/* ── Edit Button ── */
.edit-btn {
  padding: 4px 12px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-soft);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}
.edit-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Add Student Button ── */
.btn-add-student {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.btn-add-student:hover { background: var(--primary-light); }

/* ── Delete Student Button ── */
.btn-delete-student {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--absent);
  background: #fff;
  color: var(--absent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-delete-student:hover { background: var(--absent); color: #fff; }

/* ── Flash ── */
.flash {
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%);
  background: var(--present); color: #fff;
  padding: 10px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  animation: flashIn 0.3s ease;
}
@keyframes flashIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 480px) {
  /* 로그인 */
  .login-wrapper { padding: 12px; align-items: flex-start; padding-top: 40px; }
  .login-box { padding: 40px 24px 36px; }
  .login-logo .icon { width: 64px; height: 64px; font-size: 32px; border-radius: 16px; }
  .login-logo h1 { font-size: 26px; }
  .login-logo p { font-size: 15px; }
  .form-group label { font-size: 14px; }
  .form-input { font-size: 16px; padding: 14px 16px; }
  .pw-wrap .form-input { padding-right: 48px; }
  .btn-primary { font-size: 17px; padding: 16px 0; border-radius: 12px; }
  .demo-box { font-size: 13px; line-height: 1.8; }

  /* 기타 */
  .stat-value { font-size: 22px; }
  .attend-stat .value { font-size: 24px; }
  .student-name { font-size: 16px; }
}
</style>
</head>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">

      <p>학부모 포털에 로그인하세요</p>
    </div>
    <div class="form-group">
      <label>아이디</label>
      <input id="loginId" class="form-input" placeholder="아이디를 입력하세요">

    <div class="form-group">
      <label>비밀번호</label>
      <div class="pw-wrap">

</div>

<!-- ═══════════════════ PARENT SCREEN ═══════════════════ -->
<div id="parentScreen" class="hidden">

  <nav class="tab-nav">

  <main class="main-content">
    <div id="tabHome"></div>
    <div id="tabAttendance" class="hidden"></div>
    <div id="tabAchievement" class="hidden"></div>
  </main>
</div>

<!-- ═══════════════════ ADMIN SCREEN ═══════════════════ -->
<div id="adminScreen" class="hidden">
  <header class="app-header">
    <div class="logo"><span onclick="navAdminList()" style="cursor:pointer">관리자 모드</span></div>
    <div class="header-right">
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <main class="main-content" id="adminContent"></main>
</div>

// ═══════════════════ UTILITIES ═══════════════════
function $(id) { return document.getElementById(id); }
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function flash(msg) {
  const f = $('flashMsg');
  f.textContent = '✓ ' + msg;
  show(f);
  setTimeout(() => hide(f), 2500);
}

function badge(status, note) {
  const map = {
    present: { label:'출석', cls:'badge-present', icon:'✓' },
    absent:  { label:'결석', cls:'badge-absent', icon:'✕' },
    late:    { label: note || '지각', cls:'badge-late', icon:'!' },
  };
  const s = map[status] || map.present;
  return `<span class="badge ${s.cls}"><span style="font-size:11px">${s.icon}</span> ${s.label}</span>`;
}

function scoreBar(score, total) {
  const pct = total > 0 ? (score/total)*100 : 0;
  const color = pct >= 90 ? 'var(--present)' : pct >= 70 ? 'var(--accent)' : 'var(--danger)';
  return `<div class="score-bar-wrap">
    <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="score-num" style="color:${color}">${score}</span>
  </div>`;
}

function hwBadge(hw) {
  if (hw === '완료') return '<span class="badge badge-hw-done">숙제 완료</span>';
  if (hw === '면제') return '<span class="badge badge-hw-exempt">숙제 면제</span>';
  return '<span class="badge badge-hw-not">숙제 미완료</span>';
}

function miniChart(data) {
  if (!data || !data.length) return '';
  const maxVal = 100;
  const h = 120, w = 260, pad = 30;
  const innerW = w - pad*2, innerH = h - pad*1.5;
  const xStep = data.length > 1 ? innerW/(data.length-1) : 0;
  const toY = v => pad*0.5 + innerH - (v/maxVal)*innerH;

  let scorePath = data.map((d,i) => `${i===0?'M':'L'}${pad+i*xStep},${toY(d.score)}`).join(' ');
  let avgPath = data.map((d,i) => `${i===0?'M':'L'}${pad+i*xStep},${toY(d.avg)}`).join(' ');
  let dots = data.map((d,i) => {
    const x = pad + i*xStep;
    return `<circle cx="${x}" cy="${toY(d.score)}" r="4" fill="var(--primary)"/>
      <circle cx="${x}" cy="${toY(d.avg)}" r="3" fill="var(--text-muted)"/>
      <text x="${x}" y="${h-2}" text-anchor="middle" font-size="10" fill="var(--text-soft)">${d.month}</text>
      <text x="${x}" y="${toY(d.score)-8}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--primary)">${d.score}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:280px;height:auto">
    <line x1="${pad}" y1="${toY(0)}" x2="${w-pad}" y2="${toY(0)}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${pad}" y1="${toY(50)}" x2="${w-pad}" y2="${toY(50)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="${pad}" y1="${toY(100)}" x2="${w-pad}" y2="${toY(100)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
    <path d="${avgPath}" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="4,4"/>
    <path d="${scorePath}" fill="none" stroke="var(--primary)" stroke-width="2.5"/>
    ${dots}
    <circle cx="${w-pad-50}" cy="8" r="3" fill="var(--primary)"/>
    <text x="${w-pad-44}" y="11" font-size="9" fill="var(--text-soft)">내 점수</text>
    <circle cx="${w-pad-50}" cy="20" r="3" fill="var(--text-muted)"/>
    <text x="${w-pad-44}" y="23" font-size="9" fill="var(--text-muted)">반 평균</text>
  </svg>`;
}

function togglePw() {
  const inp = $('loginPw');
  const btn = inp.parentElement.querySelector('.pw-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

$('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const id = $('loginId').value.trim();
  const pw = $('loginPw').value;
  const user = USERS[id];
  if (!user || user.password !== pw) {
    $('loginErr').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    return;
  }
  currentUser = { id, ...user };
  hide($('loginScreen'));
  if (user.role === 'admin') showAdmin();
  else showParent();
  pushHistory();
}

function logout() {
  currentUser = null;
  hide($('parentScreen'));
  hide($('adminScreen'));
  show($('loginScreen'));
  $('loginId').value = '';
  $('loginPw').value = '';
  $('loginErr').textContent = '';
  history.replaceState({ screen: 'login', userId: null }, '');
}

        <h3>출결 수정</h3>
        <div class="form-group">
          <label>날짜</label>
          <input id="attDate" type="date" class="form-input" value="${a.date}">
        </div>
        <div class="form-group">
          <label>출결 상태</label>
          <div class="status-btns">
            <button class="status-btn${selectedAttStatus==='present'?' active':''}" onclick="pickAttStatus(this,'present')">출석</button>
            <button class="status-btn${selectedAttStatus==='late'?' active':''}" onclick="pickAttStatus(this,'late')">지각</button>
            <button class="status-btn${selectedAttStatus==='absent'?' active':''}" onclick="pickAttStatus(this,'absent')">결석</button>
          </div>
          <div id="lateMinutesWrap" class="late-minutes-group${selectedAttStatus==='late'?'':' hidden'}">
            <label>지각 시간</label>
            <input id="lateMinutes" type="number" class="late-minutes-input" placeholder="0" min="1" max="120" value="${parsed.mins}">
            <span class="late-minutes-unit">분</span>
          </div>
        </div>
        <div class="form-group">
          <label>비고</label>
          <input id="attNote" class="form-input" value="${parsed.extra}" placeholder="예: 병결, 가정사 등">
        </div>
        <button class="btn-primary" onclick="saveEditAttendance()">수정 저장</button>
      </div>`;
  }

  if (adminView === 'editAchieve') {
    const a = s.achievements.find(a => a.id === adminEditId);
    content = `
      <div class="form-card">
        <h3>성취도 수정</h3>
        <div class="form-group">
          <label>날짜</label>
          <input id="achDate" type="date" class="form-input" value="${a.date}">
        </div>
        <div class="form-group">
          <label>단원</label>
          <input id="achChapter" class="form-input" value="${a.chapter}" placeholder="예: 3단원 - 이차방정식">
        </div>
        <div class="form-group">
          <label>학습 주제</label>
          <input id="achTopic" class="form-input" value="${a.topic}" placeholder="예: 근의 공식 활용">
        </div>
        <div class="form-group">
          <label>점수 (100점 만점)</label>
          <input id="achScore" type="number" class="form-input" value="${a.score}" placeholder="0~100" min="0" max="100">
        </div>
        <div class="form-group">
          <label>숙제</label>
          <div class="status-btns">
            <button class="status-btn${selectedHw==='완료'?' active':''}" onclick="pickHw(this,'완료')">완료</button>
            <button class="status-btn${selectedHw==='미완료'?' active':''}" onclick="pickHw(this,'미완료')">미완료</button>
            <button class="status-btn${selectedHw==='면제'?' active':''}" onclick="pickHw(this,'면제')">면제</button>
          </div>
        </div>
        <div class="form-group">
          <label>선생님 코멘트</label>
          <textarea id="achComment" class="form-input" placeholder="학습 태도, 보충 필요 부분 등">${a.comment}</textarea>
        </div>
        <button class="btn-primary" onclick="saveEditAchievement()">수정 저장</button>
      </div>`;
  }

  c.innerHTML = `
    <button class="back-btn" onclick="navAdminList()">‹ 학생 목록</button>
    <div class="card" style="display:flex;align-items:center;gap:14px;padding:18px 20px">
      <div class="avatar sm">${s.name[0]}</div>
      <div style="flex:1">
        <div style="font-size:16px;font-weight:700">${s.name}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:2px">${s.grade} · ${s.class}</div>
      </div>
      <button class="btn-delete-student" onclick="deleteStudent('${adminSelectedStudent}')">삭제</button>
    </div>
    <div class="admin-tabs">
      <button class="${tabClass('list')}" onclick="navAdminView('list')">기록 보기</button>
      <button class="${tabClass('addAttend')}" onclick="navAdminView('addAttend')">+ 출결 입력</button>
      <button class="${tabClass('addAchieve')}" onclick="navAdminView('addAchieve')">+ 성취도 입력</button>
    </div>
    ${content}`;
}

function selectStudent(id) {
  adminSelectedStudent = id;
  adminView = 'list';
  expandedAttIndex = null;
  expandedAchId = null;
  renderAdmin();
  pushHistory();
}

// ── Attendance form helpers ──
let selectedAttStatus = 'present';
let selectedHw = '완료';
let adminEditIndex = null;
let adminEditId = null;
let expandedAttIndex = null;
let expandedAchId = null;

// ═══════════════════ HISTORY API ═══════════════════
let _restoringHistory = false;

function getAppState() {
  const screen = currentUser ? (currentUser.role === 'admin' ? 'admin' : 'parent') : 'login';
  const parentTab = screen === 'parent'
    ? (document.querySelector('.tab-btn.active')?.dataset.tab || 'home') : null;
  return {
    screen, parentTab,
    adminSelectedStudent, adminView,
    adminEditIndex, adminEditId,
    selectedAttStatus, selectedHw,
    userId: currentUser ? currentUser.id : null,
  };
}

function pushHistory() {
  if (_restoringHistory) return;
  history.pushState(getAppState(), '');
}

function replaceHistory() {
  if (_restoringHistory) return;
  history.replaceState(getAppState(), '');
}

function navAdminList() {
  adminSelectedStudent = null;
  adminView = 'list';
  expandedAttIndex = null;
  expandedAchId = null;
  renderAdmin();
  pushHistory();
}

function navAdminView(view) {
  adminView = view;
  if (view === 'list') { expandedAttIndex = null; expandedAchId = null; }
  renderAdmin();
  pushHistory();
}

window.addEventListener('popstate', function(e) {
  if (!e.state) return;
  const st = e.state;
  if (st.screen !== 'login' && (!currentUser || currentUser.id !== st.userId)) {
    history.replaceState({ screen: 'login', userId: null }, '');
    return;
  }
  _restoringHistory = true;
  try {
    if (st.screen === 'login') {
      currentUser = null;
      hide($('parentScreen'));
      hide($('adminScreen'));
      show($('loginScreen'));
      $('loginId').value = '';
      $('loginPw').value = '';
      $('loginErr').textContent = '';
    } else if (st.screen === 'parent') {
      hide($('adminScreen'));
      hide($('loginScreen'));
      show($('parentScreen'));
      $('parentNameDisplay').textContent = currentUser.parentName + '님';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tab = st.parentTab || 'home';
      const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (btn) btn.classList.add('active');
      ['tabHome','tabAttendance','tabAchievement'].forEach(id => hide($(id)));
      if (tab === 'home') { renderParentHome(); show($('tabHome')); }
      if (tab === 'attendance') { renderParentAttendance(); show($('tabAttendance')); }
      if (tab === 'achievement') { renderParentAchievement(); show($('tabAchievement')); }
    } else if (st.screen === 'admin') {
      adminSelectedStudent = st.adminSelectedStudent;
      adminView = st.adminView;
      adminEditIndex = st.adminEditIndex;
      adminEditId = st.adminEditId;
      selectedAttStatus = st.selectedAttStatus || 'present';
      selectedHw = st.selectedHw || '완료';
      expandedAttIndex = null;
      expandedAchId = null;
      hide($('loginScreen'));
      hide($('parentScreen'));
      show($('adminScreen'));
      renderAdmin();
    }
  } finally {
    _restoringHistory = false;
  }
});

function toggleAttDetail(i) {
  expandedAttIndex = expandedAttIndex === i ? null : i;
  renderAdmin();
}

function toggleAchDetail(id) {
  expandedAchId = expandedAchId === id ? null : id;
  renderAdmin();
}

function formatPhoneInput(inp) {
  const digits = inp.value.replace(/\D/g, '').slice(0, 11);
  if (digits.length <= 3) inp.value = digits;
  else if (digits.length <= 7) inp.value = digits.slice(0,3) + '-' + digits.slice(3);
  else inp.value = digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
}

function parseLate(note) {
  const m = note.match(/^(\d+)분 지각(?:\s*\/\s*(.*))?$/);
  if (m) return { mins: m[1], extra: m[2] || '' };
  const m2 = note.match(/^지각(?:\s*\/\s*(.*))?$/);
  if (m2) return { mins: '', extra: m2[1] || '' };
  return { mins: '', extra: note };
}

function editAttendance(index) {
  adminEditIndex = index;
  selectedAttStatus = DB[adminSelectedStudent].attendance[index].status;
  adminView = 'editAttend';
  renderAdmin();
  pushHistory();
}

function editAchievement(id) {
  adminEditId = id;
  const a = DB[adminSelectedStudent].achievements.find(a => a.id === id);
  selectedHw = a.homework;
  adminView = 'editAchieve';
  renderAdmin();
  pushHistory();
}

function saveEditAttendance() {
  const date = $('attDate').value;
  let note = $('attNote').value.trim();
  if (selectedAttStatus === 'late') {
    const mins = $('lateMinutes').value;
    if (mins && parseInt(mins) > 0) {
      note = mins + '분 지각' + (note ? ' / ' + note : '');
    } else {
      note = '지각' + (note ? ' / ' + note : '');
    }
  }
  DB[adminSelectedStudent].attendance[adminEditIndex] = { date, status: selectedAttStatus, note };
  flash('출결이 수정되었습니다');
  selectedAttStatus = 'present';
  adminEditIndex = null;
  adminView = 'list';
  renderAdmin();
  replaceHistory();
}

function saveEditAchievement() {
  const s = DB[adminSelectedStudent];
  const idx = s.achievements.findIndex(a => a.id === adminEditId);
  if (idx === -1) return;
  s.achievements[idx] = {
    ...s.achievements[idx],
    date: $('achDate').value,
    topic: $('achTopic').value,
    chapter: $('achChapter').value,
    score: parseInt($('achScore').value) || 0,
    homework: selectedHw,
    comment: $('achComment').value,
  };
  flash('성취도가 수정되었습니다');
  selectedHw = '완료';
  adminEditId = null;
  adminView = 'list';
  renderAdmin();
  replaceHistory();
}

function pickAttStatus(btn, status) {
  selectedAttStatus = status;
  btn.parentElement.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const wrap = $('lateMinutesWrap');
  if (status === 'late') {
    show(wrap);
  } else {
    hide(wrap);
    const inp = $('lateMinutes');
    if (inp) inp.value = '';
  }
}

function pickHw(btn, hw) {
  selectedHw = hw;
  btn.parentElement.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function saveAttendance() {
  const date = $('attDate').value;
  let note = $('attNote').value.trim();

  if (selectedAttStatus === 'late') {
    const mins = $('lateMinutes').value;
    if (mins && parseInt(mins) > 0) {
      note = mins + '분 지각' + (note ? ' / ' + note : '');
    } else {
      note = '지각' + (note ? ' / ' + note : '');
    }
  }

  DB[adminSelectedStudent].attendance.unshift({ date, status: selectedAttStatus, note });
  flash('출결이 저장되었습니다');
  selectedAttStatus = 'present';
  adminView = 'list';
  renderAdmin();
  replaceHistory();
}

function saveAchievement() {
  const s = DB[adminSelectedStudent];
  s.achievements.unshift({
    id: Date.now(),
    date: $('achDate').value,
    topic: $('achTopic').value,
    chapter: $('achChapter').value,
    score: parseInt($('achScore').value) || 0,
    total: 100,
    homework: selectedHw,
    comment: $('achComment').value,
  });
  flash('성취도가 저장되었습니다');
  selectedHw = '완료';
  adminView = 'list';
  renderAdmin();
  replaceHistory();
}

function saveStudent() {
  const name      = $('newName').value.trim();
  const grade     = $('newGrade').value.trim();
  const cls       = $('newClass').value.trim();
  const phone     = $('newPhone').value.trim();
  const startDate = $('newStartDate').value;
  const parentName = $('newParentName').value.trim();
  const userId    = $('newUserId').value.trim();
  const userPw    = $('newUserPw').value.trim();

  if (!name || !grade || !cls || !phone || !parentName || !userId || !userPw) {
    alert('모든 항목을 입력해주세요.');
    return;
  }
  if (USERS[userId]) {
    alert('이미 사용 중인 아이디입니다.');
    return;
  }

  const newStudentId = 's' + Date.now();
  DB[newStudentId] = {
    name, grade, class: cls,
    phone, startDate,
    attendance: [],
    achievements: [],
    monthlyTests: []
  };
  USERS[userId] = {
    password: userPw,
    role: 'parent',
    studentId: newStudentId,
    parentName
  };

  flash(name + ' 학생이 추가되었습니다');
  adminView = 'list';
  renderAdmin();
  replaceHistory();
}

function deleteStudent(id) {
  const s = DB[id];
  if (!confirm(`'${s.name}' 학생을 삭제하시겠습니까?\n\n출결·성취도 기록이 모두 삭제되며 복구할 수 없습니다.`)) return;
  delete DB[id];
  Object.keys(USERS).forEach(uid => {
    if (USERS[uid].studentId === id) delete USERS[uid];
  });
  flash(s.name + ' 학생이 삭제되었습니다');
  navAdminList();
}

// 페이지 로드 시 초기 히스토리 상태 등록
history.replaceState({ screen: 'login', userId: null }, '');
</script>
</body>
</html>
