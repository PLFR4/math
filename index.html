<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학전문 생각함수 - 학부모 포털</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --primary: #1B4332;
  --primary-light: #2D6A4F;
  --primary-pale: #D8F3DC;
  --accent: #E07A2F;
  --accent-pale: #FDE8D0;
  --text: #1A1A1A;
  --text-soft: #555555;
  --text-muted: #999999;
  --border: #E8E4DD;
  --present: #2D6A4F;
  --present-bg: #D8F3DC;
  --absent: #C0392B;
  --absent-bg: #FADBD8;
  --late: #E07A2F;
  --late-bg: #FDE8D0;
  --danger: #C0392B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }

/* ── Login ── */
.login-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, var(--primary) 0%, var(--primary-light) 100%);
  padding: 20px;
}
.login-box {
  width: 100%; max-width: 400px;
  background: var(--card);
  border-radius: 16px;
  padding: 48px 36px 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.login-logo {
  text-align: center;
  margin-bottom: 36px;
}
.login-logo .icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px; height: 56px;
  border-radius: 14px;
  background: var(--primary-pale);
  font-size: 28px;
  margin-bottom: 16px;
}
.login-logo h1 {
  font-size: 22px; font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
}
.login-logo p {
  font-size: 14px; color: var(--text-muted);
  margin-top: 6px;
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 13px; font-weight: 600;
  color: var(--text-soft);
  margin-bottom: 6px;
}
.form-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  background: #fff;
}
.form-input:focus { border-color: var(--primary); }
select.form-input { cursor: pointer; }
.form-input::placeholder { color: #bbb; }
.pw-wrap { position: relative; }
.pw-wrap .form-input { padding-right: 42px; }
.pw-toggle {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  cursor: pointer; font-size: 16px;
  color: var(--text-muted); padding: 4px;
}
.login-err {
  font-size: 13px; color: var(--danger);
  text-align: center; margin-top: 8px;
  min-height: 18px;
}
.btn-primary {
  width: 100%; padding: 13px 0;
  border-radius: 10px; border: none;
  background: var(--primary); color: #fff;
  font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover { background: var(--primary-light); }
.demo-box {
  margin-top: 28px;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: 10px;
  font-size: 12px; color: var(--text-muted);
  line-height: 1.7;
}
.demo-box strong { color: var(--text-soft); }

/* ── Header ── */
.app-header {
  background: var(--primary); color: #fff;
  padding: 16px 20px;
  display: flex; align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.app-header .logo { display: flex; align-items: center; gap: 10px; }
.app-header .logo span:first-child { font-size: 22px; }
.app-header .logo span:last-child { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-right .user-name { font-size: 13px; opacity: 0.8; }
.btn-logout {
  background: rgba(255,255,255,0.15); border: none;
  color: #fff; padding: 6px 14px;
  border-radius: 8px; font-size: 13px;
  cursor: pointer; font-family: inherit;
}

/* ── Tabs ── */
.tab-nav {
  display: flex; background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 99;
}
.tab-btn {
  flex: 1; padding: 12px 0;
  border: none;
  border-bottom: 3px solid transparent;
  background: none; cursor: pointer;
  font-family: inherit; font-size: 14px;
  font-weight: 500; color: var(--text-muted);
  display: flex; align-items: center;
  justify-content: center; gap: 5px;
  transition: all 0.2s;
}
.tab-btn.active {
  font-weight: 700;
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* ── Main Content ── */
.main-content {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px 16px 100px;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: 14px;
  padding: 22px 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.card-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 16px;
}
.avatar {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--primary-pale);
  display: flex; align-items: center;
  justify-content: center;
  font-size: 20px; font-weight: 800;
  color: var(--primary); flex-shrink: 0;
}
.avatar.sm { width: 44px; height: 44px; border-radius: 11px; font-size: 18px; }
.student-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
.student-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.info-cell {
  background: var(--bg);
  border-radius: 10px;
  padding: 12px 14px;
}
.info-cell .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.info-cell .value { font-size: 14px; font-weight: 600; }

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--card);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 800; }

.attend-stat {
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
}
.attend-stat .label { font-size: 11px; font-weight: 600; }
.attend-stat .value { font-size: 28px; font-weight: 800; margin-top: 4px; }

/* ── Badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
}
.badge-present { background: var(--present-bg); color: var(--present); }
.badge-absent { background: var(--absent-bg); color: var(--absent); }
.badge-late { background: var(--late-bg); color: var(--late); }
.badge-hw-done { background: var(--present-bg); color: var(--present); font-size: 12px; }
.badge-hw-not { background: var(--absent-bg); color: var(--absent); font-size: 12px; }
.badge-hw-exempt { background: var(--bg); color: var(--text-muted); font-size: 12px; }
.badge-hw-partial { background: var(--late-bg); color: var(--late); font-size: 12px; }

/* ── Score Bar ── */
.score-bar-wrap { display: flex; align-items: center; gap: 10px; width: 100%; }
.score-track {
  flex: 1; height: 8px;
  border-radius: 4px;
  background: var(--border);
  overflow: hidden;
}
.score-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.6s ease;
}
.score-num { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }

/* ── List ── */
.list-card {
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.list-title {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 15px; font-weight: 700;
}
.list-item {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.list-date { font-size: 14px; font-weight: 600; }
.list-note { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

/* ── Achievement Card ── */
.achieve-card {
  background: var(--card);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.achieve-top {
  display: flex; justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px; flex-wrap: wrap; gap: 6px;
}
.achieve-meta { font-size: 13px; color: var(--text-muted); }
.achieve-topic { font-size: 15px; font-weight: 700; margin-top: 3px; }
.achieve-comment {
  margin-top: 10px; font-size: 13px;
  color: var(--text-soft); line-height: 1.6;
  background: var(--bg);
  padding: 10px 14px; border-radius: 8px;
}

/* ── Chart ── */
.chart-section { margin-bottom: 14px; }
.chart-section h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

/* ── Admin ── */
.student-list-item {
  background: var(--card);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.1s;
}
.student-list-item:hover { transform: scale(1.01); }
.student-list-item .arrow { font-size: 18px; color: var(--text-muted); }

.back-btn {
  background: none; border: none;
  color: var(--primary); font-size: 14px;
  font-weight: 600; cursor: pointer;
  font-family: inherit;
  padding: 0 0 16px;
  display: flex; align-items: center; gap: 4px;
}
.admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.admin-tab {
  padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  border: 1px solid var(--border);
  background: var(--card); color: var(--text-soft);
  transition: all 0.15s;
}
.admin-tab.active {
  background: var(--primary);
  color: #fff; border-color: var(--primary);
}

/* ── Form ── */
.form-card {
  background: var(--card);
  border-radius: 14px;
  padding: 24px 20px;
  border: 1px solid var(--border);
}
.form-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.form-card .form-group { margin-bottom: 16px; }
textarea.form-input { resize: vertical; min-height: 80px; }
.status-btns { display: flex; gap: 8px; }
.status-btn {
  flex: 1; padding: 10px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-soft);
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.status-btn.active {
  border-color: var(--primary);
  background: var(--primary);
  color: #fff;
}

.late-minutes-group {
  margin-top: 10px;
  padding: 12px 14px;
  background: var(--late-bg);
  border-radius: 10px;
  display: flex; align-items: center; gap: 10px;
}
.late-minutes-group label {
  font-size: 13px; font-weight: 600;
  color: var(--late); white-space: nowrap;
}
.late-minutes-input {
  width: 80px; padding: 8px 10px;
  border-radius: 8px;
  border: 1.5px solid var(--accent);
  font-size: 14px; font-weight: 600;
  font-family: inherit; outline: none;
  text-align: center; background: #fff;
}
.late-minutes-input:focus { border-color: var(--primary); }
.late-minutes-unit {
  font-size: 13px; color: var(--late); font-weight: 500;
}

/* ── Edit Button ── */
.edit-btn {
  padding: 4px 12px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-soft);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}
.edit-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── Add Student Button ── */
.btn-add-student {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: var(--primary);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.btn-add-student:hover { background: var(--primary-light); }

/* ── Delete Student Button ── */
.btn-delete-student {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--absent);
  background: #fff;
  color: var(--absent);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-delete-student:hover { background: var(--absent); color: #fff; }

/* ── Flash ── */
.flash {
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%);
  background: var(--present); color: #fff;
  padding: 10px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  animation: flashIn 0.3s ease;
}
@keyframes flashIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* ── Responsive ── */
@media (max-width: 480px) {
  /* 로그인: 카드 제거하고 전체 화면 채우기 */
  .login-wrapper {
    padding: 0;
    align-items: stretch;
  }
  .login-box {
    max-width: none;
    border-radius: 0;
    box-shadow: none;
    padding: 64px 32px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .login-logo { margin-bottom: 48px; }
  .login-logo .icon { width: 72px; height: 72px; font-size: 36px; border-radius: 18px; margin-bottom: 20px; }
  .login-logo h1 { font-size: 30px; }
  .login-logo p { font-size: 16px; margin-top: 8px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { font-size: 15px; margin-bottom: 8px; }
  .form-input { font-size: 16px; padding: 15px 18px; }
  .pw-wrap .form-input { padding-right: 52px; }
  .pw-toggle { font-size: 18px; right: 14px; }
  .btn-primary { font-size: 17px; padding: 18px 0; margin-top: 8px; border-radius: 12px; }
  .demo-box { font-size: 13px; line-height: 1.9; margin-top: 28px; }

  /* 탭 4개 대응 */
  .tab-btn { font-size: 12px; padding: 10px 0; gap: 3px; }
  .tab-btn span { font-size: 14px; }

  /* 기타 */
  .stat-value { font-size: 22px; }
  .attend-stat .value { font-size: 24px; }
  .student-name { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ═══════════════════ LOGIN SCREEN ═══════════════════ -->
<div id="loginScreen" class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">🏫</div>
      <h1>수학전문 생각함수</h1>
      <p>학부모 포털에 로그인하세요</p>
    </div>
    <div class="form-group">
      <label>아이디</label>
      <input id="loginId" class="form-input" placeholder="아이디를 입력하세요">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <div class="pw-wrap">
        <input id="loginPw" type="password" class="form-input" placeholder="비밀번호를 입력하세요">
        <button class="pw-toggle" onclick="togglePw()">👁</button>
      </div>
    </div>
    <div id="loginErr" class="login-err"></div>
    <button class="btn-primary" style="margin-top:12px" onclick="doLogin()">로그인</button>
    <div class="demo-box">
      <strong>데모 계정</strong><br>
      학부모1: parent1 / 1234 &nbsp;|&nbsp; 학부모2: parent2 / 1234<br>
      관리자: admin / admin
    </div>
  </div>
</div>

<!-- ═══════════════════ PARENT SCREEN ═══════════════════ -->
<div id="parentScreen" class="hidden">
  <header class="app-header">
    <div class="logo"><span>수학전문 생각함수</span></div>
    <div class="header-right">
      <span class="user-name" id="parentNameDisplay"></span>
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="home" onclick="switchTab(this)"><span>⌂</span> 홈</button>
    <button class="tab-btn" data-tab="attendance" onclick="switchTab(this)"><span>📋</span> 출결</button>
    <button class="tab-btn" data-tab="achievement" onclick="switchTab(this)"><span>📝</span> 숙제</button>
    <button class="tab-btn" data-tab="exam" onclick="switchTab(this)"><span>📊</span> 시험</button>
  </nav>
  <main class="main-content">
    <div id="tabHome"></div>
    <div id="tabAttendance" class="hidden"></div>
    <div id="tabAchievement" class="hidden"></div>
    <div id="tabExam" class="hidden"></div>
  </main>
</div>

<!-- ═══════════════════ ADMIN SCREEN ═══════════════════ -->
<div id="adminScreen" class="hidden">
  <header class="app-header">
    <div class="logo"><span onclick="navAdminList()" style="cursor:pointer">관리자 모드</span></div>
    <div class="header-right">
      <button class="btn-logout" onclick="logout()">로그아웃</button>
    </div>
  </header>
  <main class="main-content" id="adminContent"></main>
</div>

<div id="flashMsg" class="flash hidden"></div>

function $(id) { return document.getElementById(id); }
function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }

function getStudentSchool(s) {
  if (s.school) return s.school;
  return s.grade.startsWith('중') ? '흥덕중학교' : '흥덕고등학교';
}

function calcNaesin(score, total, school, correction) {
  if (score == null || !correction || !correction[school]) return null;
  const { a, b } = correction[school];
  return Math.max(0, Math.min(100, Math.round(score / total * 100 * a + b)));
}

function correctionInputsHTML(existing, grade) {
  let filtered;
  if (grade) {
    const inGrade = new Set(Object.values(DB).filter(s => s.grade === grade).map(s => getStudentSchool(s)));
    filtered = SCHOOLS.filter(s => inGrade.has(s));
  } else {
    filtered = SCHOOLS;
  }
  if (!filtered.length) return '';
  return `
    <div class="form-group" style="margin-top:8px">
      <label>학교별 내신 보정식</label>
      <p style="font-size:12px;color:var(--text-muted);margin-top:4px;margin-bottom:10px">내신예상점수 = 원점수% × 배율 + 보정값</p>
      ${filtered.map(school => {
        const i = SCHOOLS.indexOf(school);
        const curr = existing && existing[school];
        const a = curr != null ? curr.a : 1;
        const b = curr != null ? curr.b : 0;
        return `
          <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)">
            <span style="font-size:13px;font-weight:600;flex:1;min-width:80px">${school}</span>
            <input type="number" id="corr_a_${i}" class="form-input" style="width:68px;text-align:center" value="${a}" step="0.01" min="0" placeholder="배율">
            <span style="font-size:12px;color:var(--text-muted);white-space:nowrap">× % +</span>
            <input type="number" id="corr_b_${i}" class="form-input" style="width:60px;text-align:center" value="${b}" placeholder="보정">
          </div>`;
      }).join('')}
    </div>`;
}

function collectCorrection() {
  const correction = {};
  SCHOOLS.forEach((school, i) => {
    const aEl = document.getElementById('corr_a_' + i);
    const bEl = document.getElementById('corr_b_' + i);
    if (aEl && bEl) correction[school] = { a: parseFloat(aEl.value) || 1, b: parseFloat(bEl.value) || 0 };
  });
  return correction;
}

function promptAddSchool() {
  const name = prompt('추가할 학교 이름을 입력하세요:');
  if (!name || !name.trim()) return;
  const n = name.trim();
  if (SCHOOLS.includes(n)) { alert('이미 등록된 학교입니다.'); return; }
  SCHOOLS.push(n);
  renderAdmin();
}

function removeSchool(name) {
  const inUse = Object.values(DB).some(s => getStudentSchool(s) === name);
  if (inUse) { alert('이 학교에 재학 중인 학생이 있어 삭제할 수 없습니다.'); return; }
  if (!confirm(`'${name}'을(를) 삭제하시겠습니까?`)) return;
  SCHOOLS = SCHOOLS.filter(s => s !== name);
  renderAdmin();
}

function flash(msg) {
  const f = $('flashMsg');
  f.textContent = '✓ ' + msg;
  show(f);
  setTimeout(() => hide(f), 2500);
}

function badge(status, note) {
  const map = {
    present: { label:'출석', cls:'badge-present', icon:'✓' },
    absent:  { label:'결석', cls:'badge-absent', icon:'✕' },
    late:    { label: note || '지각', cls:'badge-late', icon:'!' },
  };
  const s = map[status] || map.present;
  return `<span class="badge ${s.cls}"><span style="font-size:11px">${s.icon}</span> ${s.label}</span>`;
}

function scoreBar(score, total) {
  const pct = total > 0 ? (score/total)*100 : 0;
  const color = pct >= 90 ? 'var(--present)' : pct >= 70 ? 'var(--accent)' : 'var(--danger)';
  return `<div class="score-bar-wrap">
    <div class="score-track"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="score-num" style="color:${color}">${score}</span>
  </div>`;
}

function wrongBadge(wrong, fixed) {
  if (!wrong) return '';
  const color = fixed >= wrong ? 'var(--present)' : fixed > 0 ? 'var(--accent)' : 'var(--danger)';
  const bg = fixed >= wrong ? 'var(--present-bg)' : fixed > 0 ? 'var(--late-bg)' : 'var(--absent-bg)';
  return `<span class="badge" style="background:${bg};color:${color};font-size:12px">오답 ${wrong}개 중 ${fixed}개 수정</span>`;
}

function hwBadge(hw) {
  if (typeof hw === 'number') {
    if (hw === 100) return '<span class="badge badge-hw-done">숙제 완료</span>';
    if (hw === 0) return '<span class="badge badge-hw-not">미완료</span>';
    return `<span class="badge badge-hw-partial">${hw}% 완료</span>`;
  }
  if (hw === '완료') return '<span class="badge badge-hw-done">숙제 완료</span>';
  if (hw === '면제') return '<span class="badge badge-hw-exempt">숙제 면제</span>';
  return '<span class="badge badge-hw-not">숙제 미완료</span>';
}

function miniChart(data) {
  if (!data || !data.length) return '';
  const maxVal = 100;
  const h = 120, w = 260, pad = 30;
  const innerW = w - pad*2, innerH = h - pad*1.5;
  const xStep = data.length > 1 ? innerW/(data.length-1) : 0;
  const toY = v => pad*0.5 + innerH - (v/maxVal)*innerH;

  const hasAvg = data.some(d => d.avg != null);
  let scorePath = data.map((d,i) => `${i===0?'M':'L'}${pad+i*xStep},${toY(d.score)}`).join(' ');
  let avgPath = hasAvg ? data.map((d,i) => `${i===0?'M':'L'}${pad+i*xStep},${toY(d.avg||0)}`).join(' ') : '';
  let dots = data.map((d,i) => {
    const x = pad + i*xStep;
    return `<circle cx="${x}" cy="${toY(d.score)}" r="4" fill="var(--primary)"/>
      ${hasAvg ? `<circle cx="${x}" cy="${toY(d.avg||0)}" r="3" fill="var(--text-muted)"/>` : ''}
      <text x="${x}" y="${h-2}" text-anchor="middle" font-size="10" fill="var(--text-soft)">${d.month}</text>
      <text x="${x}" y="${toY(d.score)-8}" text-anchor="middle" font-size="10" font-weight="700" fill="var(--primary)">${d.score}</text>`;
  }).join('');

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:280px;height:auto">
    <line x1="${pad}" y1="${toY(0)}" x2="${w-pad}" y2="${toY(0)}" stroke="var(--border)" stroke-width="1"/>
    <line x1="${pad}" y1="${toY(50)}" x2="${w-pad}" y2="${toY(50)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="${pad}" y1="${toY(100)}" x2="${w-pad}" y2="${toY(100)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
    ${hasAvg ? `<path d="${avgPath}" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-dasharray="4,4"/>` : ''}
    <path d="${scorePath}" fill="none" stroke="var(--primary)" stroke-width="2.5"/>
    ${dots}
    <circle cx="${w-pad-50}" cy="8" r="3" fill="var(--primary)"/>
    <text x="${w-pad-44}" y="11" font-size="9" fill="var(--text-soft)">점수</text>
    ${hasAvg ? `<circle cx="${w-pad-50}" cy="20" r="3" fill="var(--text-muted)"/><text x="${w-pad-44}" y="23" font-size="9" fill="var(--text-muted)">반 평균</text>` : ''}
  </svg>`;
}

function togglePw() {
  const inp = $('loginPw');
  const btn = inp.parentElement.querySelector('.pw-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

$('loginPw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
$('loginId').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogin() {
  const id = $('loginId').value.trim();
  const pw = $('loginPw').value;
  const user = USERS[id];
  if (!user || user.password !== pw) {
    $('loginErr').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    return;
  }
  currentUser = { id, ...user };
  hide($('loginScreen'));
  if (user.role === 'admin') showAdmin();
  else showParent();
  pushHistory();
}

function logout() {
  currentUser = null;
  hide($('parentScreen'));
  hide($('adminScreen'));
  show($('loginScreen'));
  $('loginId').value = '';
  $('loginPw').value = '';
  $('loginErr').textContent = '';
  history.replaceState({ screen: 'login', userId: null }, '');
}

  hide($('tabAttendance'));
  hide($('tabAchievement'));
  hide($('tabExam'));
}

function switchTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const t = btn.dataset.tab;
  ['tabHome','tabAttendance','tabAchievement','tabExam'].forEach(id => hide($(id)));
  if (t === 'home') { renderParentHome(); show($('tabHome')); }
  if (t === 'attendance') { renderParentAttendance(); show($('tabAttendance')); }
  if (t === 'achievement') { renderParentAchievement(); show($('tabAchievement')); }
  if (t === 'exam') { renderParentExam(); show($('tabExam')); }
  pushHistory();
}

function selectStudent(id) {
  adminSelectedStudent = id;

  expandedExamId = null;

  pushHistory();
}

let selectedAttStatus = 'present';
let selectedHw = '완료';

let adminEditId = null;
let adminEditExamId = null;
let expandedAttIndex = null;
let expandedAchId = null;

let adminExamView = 'list';

let _restoringHistory = false;

function getAppState() {
  const screen = currentUser ? (currentUser.role === 'admin' ? 'admin' : 'parent') : 'login';
  const parentTab = screen === 'parent'
    ? (document.querySelector('.tab-btn.active')?.dataset.tab || 'home') : null;
  return {
    screen, parentTab,

window.addEventListener('popstate', function(e) {
  if (!e.state) return;
  const st = e.state;
  if (st.screen !== 'login' && (!currentUser || currentUser.id !== st.userId)) {
    history.replaceState({ screen: 'login', userId: null }, '');
    return;
  }
  _restoringHistory = true;
  try {
    if (st.screen === 'login') {
      currentUser = null;
      hide($('parentScreen'));
      hide($('adminScreen'));
      show($('loginScreen'));
      $('loginId').value = '';
      $('loginPw').value = '';
      $('loginErr').textContent = '';
    } else if (st.screen === 'parent') {
      hide($('adminScreen'));
      hide($('loginScreen'));
      show($('parentScreen'));
      $('parentNameDisplay').textContent = currentUser.parentName + '님';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      const tab = st.parentTab || 'home';
      const btn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
      if (btn) btn.classList.add('active');
      ['tabHome','tabAttendance','tabAchievement','tabExam'].forEach(id => hide($(id)));
      if (tab === 'home') { renderParentHome(); show($('tabHome')); }
      if (tab === 'attendance') { renderParentAttendance(); show($('tabAttendance')); }
      if (tab === 'achievement') { renderParentAchievement(); show($('tabAchievement')); }
      if (tab === 'exam') { renderParentExam(); show($('tabExam')); }
    } else if (st.screen === 'admin') {
      adminSelectedStudent = st.adminSelectedStudent;
      adminView = st.adminView;
      adminSection = st.adminSection || 'students';
      adminExamView = st.adminExamView || 'list';
      adminExamEditId = st.adminExamEditId || null;
      adminEditIndex = st.adminEditIndex;
      adminEditId = st.adminEditId;
      selectedAttStatus = st.selectedAttStatus || 'present';
      selectedHw = st.selectedHw || '완료';
      expandedAttIndex = null;
      expandedAchId = null;
      expandedExamId = null;
      hide($('loginScreen'));
      hide($('parentScreen'));
      show($('adminScreen'));
      renderAdmin();
    }
  } finally {
    _restoringHistory = false;
  }
});

function formatPhoneInput(inp) {
  const digits = inp.value.replace(/\D/g, '').slice(0, 11);
  if (digits.length <= 3) inp.value = digits;
  else if (digits.length <= 7) inp.value = digits.slice(0,3) + '-' + digits.slice(3);
  else inp.value = digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
}

function parseLate(note) {
  const m = note.match(/^(\d+)분 지각(?:\s*\/\s*(.*))?$/);
  if (m) return { mins: m[1], extra: m[2] || '' };
  const m2 = note.match(/^지각(?:\s*\/\s*(.*))?$/);
  if (m2) return { mins: '', extra: m2[1] || '' };
  return { mins: '', extra: note };
}

function renderParentExam() {
  const s = DB[currentUser.studentId];
  const sid = currentUser.studentId;
  const exams = Object.values(GRADE_EXAMS)
    .filter(e => e.grade === s.grade && (e.scores[sid] != null || (e.absent && e.absent[sid])))
    .sort((a, b) => a.date.localeCompare(b.date));

  if (!exams.length) {
    $('tabExam').innerHTML = `<div class="card" style="text-align:center;padding:40px 20px;color:var(--text-muted)">아직 시험 기록이 없습니다</div>`;
    return;
  }

  const chartData = exams
    .filter(e => e.scores[sid] != null)
    .map(e => ({
      month: e.date.slice(5).replace('-', '/'),
      score: Math.round(e.scores[sid] / e.total * 100),
    }));

  const cards = [...exams].reverse().map(e => {
    const isAbsent = e.absent && e.absent[sid];
    if (isAbsent) {
      return `
        <div class="achieve-card">
          <div class="achieve-top">
            <div>
              <div class="achieve-meta">${e.date}${e.scope ? ' · ' + e.scope : ''}</div>
              <div class="achieve-topic">${e.name}</div>
            </div>
            <span class="badge badge-absent" style="font-size:13px">결석</span>
          </div>
        </div>`;
    }
    const score = e.scores[sid];
    const pct = Math.round(score / e.total * 100);
    const color = pct >= 90 ? 'var(--present)' : pct >= 70 ? 'var(--accent)' : 'var(--danger)';
    const naesin = calcNaesin(score, e.total, getStudentSchool(s), e.correction);
    return `
      <div class="achieve-card">
        <div class="achieve-top">
          <div>
            <div class="achieve-meta">${e.date}${e.scope ? ' · ' + e.scope : ''}</div>
            <div class="achieve-topic">${e.name}</div>
          </div>
          <div style="text-align:right">
            <span style="font-size:20px;font-weight:800;color:${color}">${score}<span style="font-size:13px;font-weight:500;color:var(--text-muted)">/${e.total}</span></span>
            ${naesin != null ? `<div style="font-size:12px;color:var(--primary);font-weight:700;margin-top:2px">내신 예상 ${naesin}점</div>` : ''}
          </div>
        </div>
        <div style="margin:12px 0">${scoreBar(score, e.total)}</div>
      </div>`;
  }).join('');

  $('tabExam').innerHTML = `
    <div class="card chart-section"><h3>시험 점수 추이</h3>${miniChart(chartData)}</div>
    ${cards}`;
}

function renderAdminExams() {
  const c = $('adminContent');
  const sectionTabs = `
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="admin-tab" onclick="navAdminSection('students')">학생 관리</button>
      <button class="admin-tab active" onclick="navAdminSection('exams')">시험 관리</button>
    </div>`;

  if (adminExamView === 'list') {
    const gradeOrder = ['중1','중2','중3','고1','고2','고3'];
    const examsByGrade = {};
    gradeOrder.forEach(g => examsByGrade[g] = []);
    Object.values(GRADE_EXAMS).forEach(e => { if (examsByGrade[e.grade]) examsByGrade[e.grade].push(e); });
    gradeOrder.forEach(g => examsByGrade[g].sort((a,b) => b.date.localeCompare(a.date)));

    const examSections = gradeOrder.map(grade => {
      const exams = examsByGrade[grade];
      const examCards = exams.length ? exams.map(e => {
        const students = Object.entries(DB).filter(([id, s]) => s.grade === e.grade);
        const scored = students.filter(([id]) => e.scores[id] != null && !(e.absent && e.absent[id]));
        const absentCount = students.filter(([id]) => e.absent && e.absent[id]).length;
        const avgPct = scored.length > 0
          ? Math.round(scored.reduce((sum, [id]) => sum + Math.round(e.scores[id]/e.total*100), 0) / scored.length) : null;
        return `
          <div class="card" style="padding:16px 20px;margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
              <div>
                <div style="font-size:13px;color:var(--text-muted)">${e.date}</div>
                <div style="font-size:15px;font-weight:700;margin-top:3px">${e.name}</div>
                ${e.scope ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">범위: ${e.scope}</div>` : ''}
              </div>
              <div style="text-align:right;flex-shrink:0;margin-left:12px">
                <div style="font-size:12px;color:var(--text-muted)">${scored.length}명 응시${absentCount ? ' · <span style="color:var(--absent)">'+absentCount+'명 결석</span>' : ''}</div>
                ${avgPct != null ? `<div style="font-size:14px;font-weight:700;color:var(--primary)">평균 ${avgPct}%</div>` : ''}
              </div>
            </div>
            ${students.map(([id, s]) => {
              const isAbsent = e.absent && e.absent[id];
              const score = e.scores[id];
              const pct = score != null ? Math.round(score/e.total*100) : null;
              const color = isAbsent ? 'var(--absent)' : (pct != null ? (pct>=90?'var(--present)':pct>=70?'var(--accent)':'var(--danger)') : 'var(--text-muted)');
              const display = isAbsent ? '결석' : (score != null ? score+'/'+e.total : '미입력');
              const naesin = isAbsent ? null : calcNaesin(score, e.total, getStudentSchool(s), e.correction);
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border)">
                <span style="font-size:14px;font-weight:600">${s.name}</span>
                <div style="text-align:right">
                  <div style="font-size:14px;font-weight:700;color:${color}">${display}</div>
                  ${naesin != null ? `<div style="font-size:11px;color:var(--text-muted)">내신 예상 ${naesin}점</div>` : ''}
                </div>
              </div>`;
            }).join('')}
            <button class="btn-primary" style="margin-top:12px;padding:9px 0;font-size:13px" onclick="editGradeExam(${e.id})">수정</button>
          </div>`;
      }).join('') : `<div style="padding:12px 4px;font-size:13px;color:var(--text-muted)">등록된 시험 없음</div>`;

      return `
        <div style="margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:8px;padding:7px 6px;background:var(--card-bg);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;margin-bottom:10px">
            <span style="font-size:14px;font-weight:800;color:var(--primary)">${grade}</span>
            <span style="font-size:12px;color:var(--text-muted)">${exams.length}개</span>
          </div>
          ${examCards}
        </div>`;
    }).join('');

    c.innerHTML = sectionTabs + `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 style="font-size:18px;font-weight:800;letter-spacing:-0.3px">시험 관리</h2>
        <button class="btn-add-student" onclick="navExamView('addExam')">+ 시험 추가</button>
      </div>
      ${examSections}`;
    return;
  }

  if (adminExamView === 'addExam') {
    const today = new Date().toISOString().slice(0,10);
    c.innerHTML = sectionTabs + `
      <div class="form-card">
        <h3>시험 추가</h3>
        <div class="form-group">
          <label>날짜</label>
          <input id="examDate" type="date" class="form-input" value="${today}">
        </div>
        <div class="form-group">
          <label>시험명</label>
          <input id="examName" class="form-input" placeholder="예: 5월 3주차 시험">
        </div>
        <div class="form-group">
          <label>시험 범위</label>
          <input id="examScope" class="form-input" placeholder="예: 2단원 - 인수분해">
        </div>
        <div class="form-group">
          <label>만점</label>
          <input id="examTotal" type="number" class="form-input" value="100" min="1">
        </div>
        <div class="form-group">
          <label>학년</label>
          <select id="examGrade" class="form-input" onchange="renderExamStudentInputs()">
            <option value="">학년 선택</option>
            <option value="중1">중1</option>
            <option value="중2">중2</option>
            <option value="중3">중3</option>
            <option value="고1">고1</option>
            <option value="고2">고2</option>
            <option value="고3">고3</option>
          </select>
        </div>
        <div id="examStudentInputs"></div>
        <div id="examCorrectionInputs"></div>
        <button class="btn-primary" style="margin-top:16px" onclick="saveGradeExam()">저장</button>
      </div>`;
    return;
  }

  if (adminExamView === 'editExam') {
    const e = GRADE_EXAMS[adminExamEditId];
    if (!e) { adminExamView = 'list'; renderAdminExams(); return; }
    const students = Object.entries(DB).filter(([id, s]) => s.grade === e.grade);
    c.innerHTML = sectionTabs + `
      <div class="form-card">
        <h3>시험 수정</h3>
        <div class="form-group">
          <label>날짜</label>
          <input id="examDate" type="date" class="form-input" value="${e.date}">
        </div>
        <div class="form-group">
          <label>시험명</label>
          <input id="examName" class="form-input" value="${e.name}">
        </div>
        <div class="form-group">
          <label>시험 범위</label>
          <input id="examScope" class="form-input" value="${e.scope || ''}">
        </div>
        <div class="form-group">
          <label>만점</label>
          <input id="examTotal" type="number" class="form-input" value="${e.total}" min="1">
        </div>
        <div class="form-group">
          <label>학년</label>
          <div style="padding:12px 14px;background:var(--bg);border-radius:10px;font-size:15px;font-weight:600">${e.grade}</div>
        </div>
        <div class="form-group">
          <label>학생별 점수</label>
          ${students.map(([id, s]) => {
            const isAbsent = e.absent && e.absent[id];
            return `
            <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)">
              <span style="flex:1;font-size:14px;font-weight:600">${s.name}</span>
              <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--absent);cursor:pointer;white-space:nowrap;flex-shrink:0">
                <input type="checkbox" id="absent_${id}" ${isAbsent ? 'checked' : ''} onchange="toggleExamAbsent('${id}')"> 결석
              </label>
              <input type="number" id="score_${id}" class="form-input" style="width:80px;text-align:center${isAbsent ? ';opacity:0.3' : ''}"
                value="${e.scores[id] != null ? e.scores[id] : ''}" min="0" max="${e.total}" placeholder="점수" ${isAbsent ? 'disabled' : ''}>
              <span style="font-size:13px;color:var(--text-muted);white-space:nowrap">/ ${e.total}</span>
            </div>`;
          }).join('')}
        </div>
        ${correctionInputsHTML(e.correction || null, e.grade)}
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn-primary" style="flex:1" onclick="saveEditGradeExam()">수정 저장</button>
          <button class="btn-delete-student" onclick="deleteGradeExam(${e.id})">삭제</button>
        </div>
      </div>`;
    return;
  }
}

// 페이지 로드 시 초기 히스토리 상태 등록
history.replaceState({ screen: 'login', userId: null }, '');
</script>
</body>
</html>
